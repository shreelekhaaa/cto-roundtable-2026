<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F8FD; --card: #FFFFFF; --ink: #14223D; --ink-soft: #5A6B85;
    --ink-faint: #97A3B8; --line: #E4EAF3; --track: #EAF0F8;
    --brand: #0047C4; --navy: #002F6C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg);
    color: var(--ink); line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 56px 24px 80px; }
  header { margin-bottom: 36px; }
  .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--brand); margin-bottom: 10px; }
  h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; color: var(--navy); }
  .sub { font-size: 15px; color: var(--ink-soft); max-width: 580px; }
  .tabs { display: flex; gap: 6px; margin: 32px 0 8px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .tab { appearance: none; border: none; background: none; cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 600; color: var(--ink-faint); padding: 12px 16px; position: relative; transition: color .18s ease; }
  .tab:hover { color: var(--ink-soft); }
  .tab.active { color: var(--ink); }
  .tab.active::after { content: ''; position: absolute; left: 16px; right: 16px; bottom: -1px;
    height: 2px; background: var(--tab-accent, var(--brand)); border-radius: 2px; }
  .tab .dot { font-size: 9px; margin-right: 7px; vertical-align: middle; }
  .panel { display: none; padding-top: 28px; }
  .panel.active { display: block; animation: fade .3s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 24px 26px; margin-bottom: 18px; }
  .q-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 6px; }
  .q-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .q-meta { font-size: 12px; color: var(--ink-faint); white-space: nowrap; padding-top: 3px; }
  .q-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
    padding: 3px 9px; border-radius: 20px; margin-bottom: 16px; }
  .tag-single { background: var(--track); color: var(--ink-soft); }
  .tag-multi  { background: #E1EBFB; color: #0A47BD; }
  .tag-rating { background: #E0E9F6; color: #002F6C; }
  /* horizontal bars (multi-select) */
  .bars { display: flex; flex-direction: column; gap: 13px; margin-top: 4px; }
  .bar-row { display: grid; grid-template-columns: 1fr; gap: 5px; }
  .bar-label { display: flex; justify-content: space-between; gap: 14px; font-size: 13.5px; }
  .bar-label .txt { color: var(--ink); }
  .bar-label .val { color: var(--ink-soft); font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .track { height: 9px; background: var(--track); border-radius: 6px; overflow: hidden; }
  .fill { height: 100%; border-radius: 6px; width: 0; transition: width .7s cubic-bezier(.22,.61,.36,1); }
  .bar-row.top .txt { font-weight: 600; }
  /* pie (single-select) */
  .pie-card { display: grid; grid-template-columns: 168px 1fr; gap: 30px; align-items: center; }
  .pie-wrap { width: 168px; height: 168px; }
  .pie-svg { width: 168px; height: 168px; display: block; transform-origin: center; }
  .panel.active .pie-svg { animation: popIn .55s cubic-bezier(.22,.61,.36,1); }
  @keyframes popIn { from { transform: scale(.84); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .pie-legend { display: flex; flex-direction: column; gap: 10px; }
  .legend-row { display: grid; grid-template-columns: 12px 1fr auto; gap: 11px; align-items: center; font-size: 13.5px; }
  .legend-row .sw { width: 11px; height: 11px; border-radius: 3px; }
  .legend-row .txt { color: var(--ink); }
  .legend-row.top .txt { font-weight: 600; }
  .legend-row .val { color: var(--ink-soft); font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
  /* rating */
  .rating-card { display: grid; grid-template-columns: 150px 1fr; gap: 28px; align-items: center; }
  .rating-score { text-align: center; }
  .rating-num { font-size: 52px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; }
  .rating-outof { font-size: 14px; color: var(--ink-faint); margin-top: 4px; }
  .rating-dots { margin-top: 12px; font-size: 16px; letter-spacing: 2px; }
  .rdist { display: flex; flex-direction: column; gap: 9px; }
  .rdist-row { display: grid; grid-template-columns: 22px 1fr 46px; gap: 12px; align-items: center; font-size: 13px; }
  .rdist-row .lvl { color: var(--ink-soft); font-weight: 600; text-align: center; }
  .rdist-row .val { color: var(--ink-soft); text-align: right; font-variant-numeric: tabular-nums; }
  footer { margin-top: 40px; font-size: 12px; color: var(--ink-faint); text-align: center; }
  @media (max-width: 560px) {
    .rating-card { grid-template-columns: 1fr; gap: 18px; }
    .pie-card { grid-template-columns: 1fr; gap: 20px; justify-items: center; }
    .pie-legend { width: 100%; }
    h1 { font-size: 27px; }
  }
</style>
</head>

ount": 9, "pct": 0.3462}, {"label": "5", "count": 4, "pct": 0.1538}]}]};
const SEG_META = {"Costs & AI": {"accent": "#0047C4", "soft": "#E1EBFB", "icon": "◆"}, "Agents in Production": {"accent": "#002F6C", "soft": "#DCE6F5", "icon": "●"}, "Team & Org": {"accent": "#2F7BE4", "soft": "#E3EEFC", "icon": "▲"}};
const tagText = { single: 'Single choice', multi: 'Multi-select', rating: 'Rating 1–5' };
function pctStr(p){ return (p*100).toFixed(0)+'%'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function tint(hex, t){
  const c = parseInt(hex.slice(1),16);
  let r=(c>>16)&255, g=(c>>8)&255, b=c&255;
  r=Math.round(r+(255-r)*t); g=Math.round(g+(255-g)*t); b=Math.round(b+(255-b)*t);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function polar(cx,cy,r,deg){ const a=(deg-90)*Math.PI/180; return {x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)}; }
function arcPath(cx,cy,r,a0,a1){
  const s=polar(cx,cy,r,a1), e=polar(cx,cy,r,a0);
  const large = (a1-a0)<=180 ? 0 : 1;
  return ['M',cx,cy,'L',e.x,e.y,'A',r,r,0,large,1,s.x,s.y,'Z'].join(' ');
}

function renderBars(q, accent){
  const maxPct = Math.max(...q.options.map(o=>o.pct), 0.0001);
  return '<div class="bars">' + q.options.map((o,i)=>{
    const w = (o.pct/maxPct)*100;
    const isTop = i===0 && o.count>0;
    const color = isTop ? accent : accent+'70';
    return '<div class="bar-row '+(isTop?'top':'')+'">'
      + '<div class="bar-label"><span class="txt">'+esc(o.label)+'</span>'
      + '<span class="val">'+pctStr(o.pct)+' · '+o.count+'</span></div>'
      + '<div class="track"><div class="fill" data-w="'+w+'" style="background:'+color+'"></div></div></div>';
  }).join('') + '</div>';
}

function renderPie(q, accent){
  const cx=84, cy=84, r=82;
  const total = q.options.reduce((s,o)=>s+o.count,0) || 1;
  const n = q.options.length;
  let ang = 0, paths = '';
  q.options.forEach((o,i)=>{
    const color = o.count===0 ? '#DDE4EE' : tint(accent, n<=1?0:(i/(n-1))*0.62);
    o._color = color;
    if(o.count>0){
      const frac = o.count/total, sweep = frac*360;
      if(frac >= 0.999){
        paths += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+color+'"/>';
      } else {
        paths += '<path d="'+arcPath(cx,cy,r,ang,ang+sweep)+'" fill="'+color+'" stroke="#FFFFFF" stroke-width="2"/>';
        ang += sweep;
      }
    }
  });
  const legend = q.options.map((o,i)=>{
    const isTop = i===0 && o.count>0;
    return '<div class="legend-row '+(isTop?'top':'')+'">'
      + '<span class="sw" style="background:'+o._color+'"></span>'
      + '<span class="txt">'+esc(o.label)+'</span>'
      + '<span class="val">'+pctStr(o.pct)+' · '+o.count+'</span></div>';
  }).join('');
  return '<div class="pie-card"><div class="pie-wrap">'
    + '<svg class="pie-svg" viewBox="0 0 168 168">'+paths+'</svg></div>'
    + '<div class="pie-legend">'+legend+'</div></div>';
}

function renderRating(q, accent){
  const rr = Math.round(q.avgRating);
  const dots = '●'.repeat(rr) + '○'.repeat(5-rr);
  const maxC = Math.max(...q.options.map(o=>o.count), 1);
  const byLvl = {}; q.options.forEach(o=>byLvl[o.label]=o);
  let dist = '';
  for(let l=5;l>=1;l--){
    const o = byLvl[String(l)] || {count:0,pct:0};
    const w = (o.count/maxC)*100;
    dist += '<div class="rdist-row"><span class="lvl">'+l+'</span>'
      + '<div class="track"><div class="fill" data-w="'+w+'" style="background:'+accent+'"></div></div>'
      + '<span class="val">'+o.count+'</span></div>';
  }
  return '<div class="rating-card"><div class="rating-score">'
    + '<div class="rating-num" style="color:'+accent+'">'+q.avgRating.toFixed(1)+'</div>'
    + '<div class="rating-outof">avg · out of 5</div>'
    + '<div class="rating-dots" style="color:'+accent+'">'+dots+'</div></div>'
    + '<div class="rdist">'+dist+'</div></div>';
}

function card(q, accent){
  let body;
  if(q.type==='rating') body = renderRating(q, accent);
  else if(q.type==='single') body = renderPie(q, accent);
  else body = renderBars(q, accent);
  return '<div class="card"><div class="q-head"><div class="q-title">'+esc(q.question)+'</div>'
    + '<div class="q-meta">'+q.totalVotes+' votes</div></div>'
    + '<span class="q-tag tag-'+q.type+'">'+tagText[q.type]+'</span>'+body+'</div>';
}

const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');
const segs = Object.keys(DATA);
segs.forEach((seg, idx)=>{
  const m = SEG_META[seg];
  const btn = document.createElement('button');
  btn.className = 'tab' + (idx===0?' active':'');
  btn.style.setProperty('--tab-accent', m.accent);
  btn.innerHTML = '<span class="dot" style="color:'+m.accent+'">'+m.icon+'</span>'+seg;
  btn.onclick = ()=>activate(idx);
  tabsEl.appendChild(btn);
  const panel = document.createElement('div');
  panel.className = 'panel' + (idx===0?' active':'');
  panel.innerHTML = DATA[seg].map(q=>card(q, m.accent)).join('');
  panelsEl.appendChild(panel);
});

function animate(panel){
  if(!panel) return;
  panel.querySelectorAll('.fill').forEach(f=>{
    requestAnimationFrame(()=>{ f.style.width = f.dataset.w + '%'; });
  });
}
function activate(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', i===idx));
  document.querySelectorAll('.panel').forEach((p,i)=>{
    const on = i===idx; p.classList.toggle('active', on);
    if(on){ p.querySelectorAll('.fill').forEach(f=>f.style.width='0'); animate(p); }
  });
}
animate(document.querySelector('.panel.active'));
</script>
