<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTO Roundtable 2026 — Team &amp; Org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F8FD; --card: #FFFFFF; --ink: #14223D; --ink-soft: #5A6B85;
    --ink-faint: #97A3B8; --line: #E4EAF3; --track: #EAF0F8;
    --brand: #0047C4; --navy: #002F6C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg);
    color: var(--ink); line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1082px; margin: 0 auto; padding: 40px 16px 56px; }
  .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--brand); margin-bottom: 10px; }
  h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; color: var(--navy); }
  .sub { font-size: 15px; color: var(--ink-soft); max-width: 580px; }

  /* ---- deck / carousel ---- */
  /* --ar sets the uniform slide aspect ratio (width / height). Change it here. */
  .deck { width: 1050px; height: 600px; max-width: 100%; margin: 0 auto; position: relative; overflow: hidden; touch-action: pan-y; }
  .track { display: flex; height: 100%; transition: transform .5s cubic-bezier(.22,.61,.36,1); }
  .slide { flex: 0 0 100%; max-width: 100%; height: 100%; padding: 10px 8px;
    display: flex; flex-direction: column; justify-content: center; overflow-y: auto; }
  .slide .card { margin-bottom: 0; width: 100%; }
  /* question slides: card fills the frame, its content vertically centred */
  .q-slide .card { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; }
  /* deck is a fixed 1050 x 600 frame */

  /* slide title (intro) */
  .slide-title { padding-top: 6px; }

  /* controls */
  .controls { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 26px; }
  .navbtn { appearance: none; border: 1px solid var(--line); background: var(--card); cursor: pointer;
    width: 40px; height: 40px; border-radius: 11px; color: var(--ink-soft); font-size: 17px;
    display: grid; place-items: center; transition: all .18s ease; flex: none; }
  .navbtn:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); transform: translateY(-1px);
    box-shadow: 0 6px 16px -10px rgba(0,71,196,.5); }
  .navbtn:disabled { opacity: .35; cursor: default; }
  .dots { display: flex; gap: 8px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); border: none; padding: 0;
    cursor: pointer; transition: all .25s cubic-bezier(.22,.61,.36,1); }
  .dot:hover { background: var(--ink-faint); }
  .dot.on { background: var(--brand); width: 22px; border-radius: 5px; }
  .counter { font-size: 12.5px; color: var(--ink-faint); font-variant-numeric: tabular-nums;
    font-weight: 600; min-width: 42px; text-align: center; }
  .hint { text-align: center; font-size: 11.5px; color: var(--ink-faint); margin-top: 12px; }
  .hint kbd { font-family: inherit; font-size: 11px; background: var(--track); border: 1px solid var(--line);
    border-radius: 5px; padding: 1px 6px; color: var(--ink-soft); }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 24px 26px; }
  .q-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 6px; }
  .q-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .q-meta { font-size: 12px; color: var(--ink-faint); white-space: nowrap; padding-top: 3px; }
  .q-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
    padding: 3px 9px; border-radius: 20px; margin-bottom: 16px; }
  .tag-single { background: var(--track); color: var(--ink-soft); }
  .tag-multi  { background: #E1EBFB; color: #0A47BD; }
  .tag-rating { background: #E0E9F6; color: #002F6C; }
  /* horizontal bars (multi-select) */
  .bars { display: flex; flex-direction: column; gap: 13px; margin-top: 4px; }
  .bar-row { display: grid; grid-template-columns: 1fr; gap: 5px; }
  .bar-label { display: flex; justify-content: space-between; gap: 14px; font-size: 13.5px; }
  .bar-label .txt { color: var(--ink); }
  .bar-label .val { color: var(--ink-soft); font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .track-bar { height: 9px; background: var(--track); border-radius: 6px; overflow: hidden; }
  .fill { height: 100%; border-radius: 6px; width: 0; transition: width .7s cubic-bezier(.22,.61,.36,1); }
  .bar-row.top .txt { font-weight: 600; }
  /* rating */
  footer { margin-top: 36px; font-size: 12px; color: var(--ink-faint); text-align: center; }
  @media (max-width: 560px) {
    h1 { font-size: 25px; }
  }
  /* ---- section intro ---- */
  .lede { font-size: 15px; color: var(--ink-soft); max-width: 620px; margin: 4px 0 22px; }
  .stat-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px;
    transition: transform .22s cubic-bezier(.22,.61,.36,1), box-shadow .22s ease; }
  .stat:hover { transform: translateY(-2px); box-shadow: 0 8px 22px -14px rgba(20,34,61,.22); }
  .stat .n { font-size: 27px; font-weight: 700; letter-spacing: -0.02em; color: var(--navy); font-variant-numeric: tabular-nums; }
  .stat .l { font-size: 12.5px; color: var(--ink-soft); margin-top: 7px; line-height: 1.4; }
  @media (max-width: 760px) { .stat-strip { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 430px) { .stat-strip { grid-template-columns: 1fr; } }
  /* ---- card hover ---- */
  .card { transition: transform .22s cubic-bezier(.22,.61,.36,1), box-shadow .22s ease, border-color .22s ease; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -16px rgba(20,34,61,.20);
    border-color: color-mix(in srgb, var(--card-accent, #0047C4) 32%, var(--line)); }
  /* ---- insight callout ---- */
  .insight { margin-top: 18px; padding: 13px 16px; background: var(--insight-bg, #F3F7FE);
    border-left: 3px solid var(--card-accent, var(--brand)); border-radius: 0 9px 9px 0;
    font-size: 13.5px; color: var(--ink-soft); line-height: 1.55; }
  .insight .k { font-weight: 600; color: var(--ink); }
  /* ---- cross-highlight ---- */
  [data-idx] { transition: opacity .16s ease; }
  .chart.hl-on [data-idx].dim { opacity: .3; }
  .bar-row.hl .txt, .legend-row.hl .txt, .distbar-li.hl { color: var(--ink); font-weight: 600; }
  .bar-row.hl .fill { filter: saturate(1.12) brightness(1.05); }
  .dc-n { font-size: 21px; font-weight: 700; }
  .dc-l { font-size: 8.5px; fill: var(--ink-faint); text-transform: uppercase; letter-spacing: .1em; }
  /* ---- distribution bar ---- */
  .distbar-track { display: flex; height: 34px; border-radius: 9px; overflow: hidden; background: var(--track); }
  .distbar-seg { flex-grow: 0; flex-shrink: 0; flex-basis: 0%; height: 100%; cursor: pointer;
    transition: flex-basis .75s cubic-bezier(.22,.61,.36,1), opacity .16s ease; }
  .distbar-seg + .distbar-seg { box-shadow: -1px 0 0 #fff; }
  .distbar-legend { display: flex; flex-wrap: wrap; gap: 10px 20px; margin-top: 15px; }
  .distbar-li { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); }
  .distbar-li .sw { width: 10px; height: 10px; border-radius: 3px; flex: none; }
  .distbar-li .v { font-weight: 600; font-variant-numeric: tabular-nums; color: var(--ink); }
  .bar-row, .legend-row { cursor: default; }
  /* ---- lollipop ---- */
  .lolli { display: flex; flex-direction: column; gap: 15px; margin-top: 4px; }
  .lrow { display: flex; flex-direction: column; gap: 7px; }
  .lhead { display: flex; justify-content: space-between; gap: 14px; font-size: 13.5px; }
  .lhead .lt { color: var(--ink); }
  .lhead .lt.top { font-weight: 600; }
  .lhead .lv { color: var(--ink-soft); font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .ltrack { position: relative; height: 11px; display: flex; align-items: center; }
  .lstem { height: 3px; width: 0; border-radius: 2px; transition: width .7s cubic-bezier(.22,.61,.36,1); }
  .ldot { position: absolute; top: 50%; left: 0; width: 11px; height: 11px; border-radius: 50%; transform: translate(-50%,-50%); transition: left .7s cubic-bezier(.22,.61,.36,1); }
  .lrow.hl .lt { color: var(--ink); font-weight: 600; }
  /* ---- diverging tick ---- */
  .div-track { position: relative; overflow: visible; }
  .div-tick { position: absolute; left: 50%; top: -4px; bottom: -4px; width: 2px; background: var(--ink-faint); transform: translateX(-50%); opacity: .45; }
  /* ---- bubbles sizing ---- */
  .bubbles svg { display: block; width: 100%; max-width: 480px; margin: 0 auto; }
  /* ---- waffle ---- */
  .waffle { display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; padding: 8px 0; }
  .wgrid { display: grid; grid-template-columns: repeat(10, 22px); grid-auto-rows: 22px; gap: 6px; flex: none; }
  .wdot { width: 22px; height: 22px; border-radius: 5px; }
  .wlegend { flex: 0 1 250px; min-width: 200px; display: flex; flex-direction: column; gap: 11px; }
  /* ---- histogram (ratings) ---- */
  .histo { display: flex; align-items: flex-end; gap: 30px; flex-wrap: wrap; }
  .hscore { flex: none; }
  .hnum { font-size: 42px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .hsub { font-size: 12px; color: var(--ink-faint); margin-top: 5px; }
  .hwrap { position: relative; flex: 1; min-width: 230px; }
  .hcols { display: flex; align-items: flex-end; gap: 14px; height: 130px; }
  .hcol { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 6px; }
  .hc-n { font-size: 12px; color: var(--ink-soft); font-weight: 600; font-variant-numeric: tabular-nums; }
  .hbar { width: 100%; max-width: 36px; border-radius: 5px 5px 0 0; height: 0; transition: height .7s cubic-bezier(.22,.61,.36,1); }
  .hc-l { font-size: 12px; color: var(--ink-faint); }
  .havg { position: absolute; top: 0; bottom: 24px; width: 0; border-left: 2px dashed var(--ink-faint); }
  .havg span { position: absolute; top: -4px; left: 6px; font-size: 10.5px; color: var(--ink-soft); white-space: nowrap; }
</style>
</head>

function pctStr(p){ return (p*100).toFixed(0)+'%'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function tint(hex, t){
  const c = parseInt(hex.slice(1),16);
  let r=(c>>16)&255, g=(c>>8)&255, b=c&255;
  r=Math.round(r+(255-r)*t); g=Math.round(g+(255-g)*t); b=Math.round(b+(255-b)*t);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function renderLollipop(q, accent){
  const max = Math.max(...q.options.map(o=>o.pct), 0.0001);
  return '<div class="chart lolli">' + q.options.map((o,i)=>{
    const w = (o.pct/max)*100;
    const top = i===0 && o.count>0;
    const col = top ? accent : tint(accent, 0.4);
    return '<div class="lrow" data-idx="'+i+'">'
      + '<div class="lhead"><span class="lt'+(top?' top':'')+'">'+esc(o.label)+'</span>'
      + '<span class="lv">'+pctStr(o.pct)+' · '+o.count+'</span></div>'
      + '<div class="ltrack"><div class="lstem" data-w="'+w+'" style="background:'+col+'"></div>'
      + '<div class="ldot" data-w="'+w+'" style="background:'+col+'"></div></div></div>';
  }).join('') + '</div>';
}

function renderDiverging(q, accent){
  const order = REORDER[q.pollId] || q.options.map((_,i)=>i);
  const opts = order.map(i=>q.options[i]).filter(o=>o.count>0);
  const n = opts.length, total = opts.reduce((s,o)=>s+o.count,0) || 1;
  const track = '<div class="distbar-track div-track">' + opts.map((o,j)=>{
    o._color = tint(accent, n<=1?0:(j/(n-1))*0.62);
    const basis = (o.count/total)*100;
    return '<div class="distbar-seg" data-idx="'+q.options.indexOf(o)+'" data-basis="'+basis+'" style="background:'+o._color+'" title="'+esc(o.label)+'"></div>';
  }).join('') + '<div class="div-tick"></div></div>';
  const legend = '<div class="distbar-legend">' + opts.map(o=>
    '<div class="distbar-li" data-idx="'+q.options.indexOf(o)+'"><span class="sw" style="background:'+o._color+'"></span>'
    + '<span class="t">'+esc(o.label)+'</span> <span class="v">'+pctStr(o.pct)+'</span></div>'
  ).join('') + '</div>';
  return '<div class="chart diverging">'+track+legend+'</div>';
}

function renderBubbles(q, accent){
  const opts = q.options.filter(o=>o.count>0);
  const n = opts.length, maxC = Math.max(...opts.map(o=>o.count));
  let k = 22/Math.sqrt(maxC);
  let rads = opts.map(o=>Math.sqrt(o.count)*k);
  const gap = 14;
  let totalW = rads.reduce((s,r)=>s+2*r,0) + gap*(n-1);
  if(totalW > 296){ const sc = 296/totalW; rads = rads.map(r=>r*sc); }
  totalW = rads.reduce((s,r)=>s+2*r,0) + gap*(n-1);
  let x = (300-totalW)/2; const cy = 46;
  let circles = '', labels = '';
  opts.forEach((o,j)=>{
    const r = rads[j], cx = x + r;
    o._color = tint(accent, n<=1?0:(j/(n-1))*0.6);
    const idx = q.options.indexOf(o);
    circles += '<circle data-idx="'+idx+'" cx="'+cx.toFixed(1)+'" cy="'+cy+'" r="'+r.toFixed(1)+'" fill="'+o._color+'"/>';
    labels += '<text data-idx="'+idx+'" x="'+cx.toFixed(1)+'" y="86" text-anchor="middle" style="fill:var(--ink-soft)" font-size="11">'+pctStr(o.pct)+'</text>';
    x += 2*r + gap;
  });
  const legend = '<div class="distbar-legend">' + opts.map(o=>
    '<div class="distbar-li" data-idx="'+q.options.indexOf(o)+'"><span class="sw" style="background:'+o._color+'"></span>'
    + '<span class="t">'+esc(o.label)+'</span></div>'
  ).join('') + '</div>';
  return '<div class="chart bubbles"><svg viewBox="0 0 300 96" style="width:100%;height:auto">'+circles+labels+'</svg>'+legend+'</div>';
}

function renderHistogram(q, accent){
  const byLvl = {}; q.options.forEach(o=>byLvl[o.label]=o);
  const counts = []; for(let l=1;l<=5;l++) counts.push((byLvl[String(l)]||{count:0}).count);
  const maxC = Math.max(...counts, 1);
  let cols = '';
  for(let l=1;l<=5;l++){
    const c = counts[l-1], h = Math.max(2, (c/maxC)*84);
    cols += '<div class="hcol"><span class="hc-n">'+c+'</span>'
      + '<div class="hbar" data-h="'+h.toFixed(0)+'" style="background:'+tint(accent, 0.1+0.12*(5-l))+'"></div>'
      + '<span class="hc-l">'+l+'</span></div>';
  }
  const pos = ((q.avgRating-0.5)/5)*100;
  return '<div class="chart histo">'
    + '<div class="hscore"><div class="hnum" data-count="'+q.avgRating.toFixed(1)+'" style="color:'+accent+'">0.0</div><div class="hsub">avg of 5</div></div>'
    + '<div class="hwrap"><div class="hcols">'+cols+'</div>'
    + '<div class="havg" style="left:'+pos.toFixed(1)+'%"><span>avg '+q.avgRating.toFixed(1)+'</span></div></div></div>';
}

function renderBars(q, accent){
  const max = Math.max(...q.options.map(o=>o.pct), 0.0001);
  return '<div class="chart bars">' + q.options.map((o,i)=>{
    const w = (o.pct/max)*100;
    const top = i===0 && o.count>0;
    const col = top ? accent : tint(accent, 0.42);
    return '<div class="bar-row '+(top?'top':'')+'" data-idx="'+i+'">'
      + '<div class="bar-label"><span class="txt">'+esc(o.label)+'</span>'
      + '<span class="val">'+pctStr(o.pct)+' · '+o.count+'</span></div>'
      + '<div class="track-bar"><div class="fill" data-w="'+w+'" style="background:'+col+'"></div></div></div>';
  }).join('') + '</div>';
}

function renderWaffle(q, accent){
  const opts = q.options.filter(o=>o.count>0);
  const n = opts.length, total = opts.reduce((s,o)=>s+o.count,0) || 1;
  const raw = opts.map(o=>o.count/total*100);
  const base = raw.map(Math.floor);
  const rem = 100 - base.reduce((a,b)=>a+b,0);
  const fracs = raw.map((v,i)=>({i, f:v-base[i]})).sort((a,b)=>b.f-a.f);
  for(let k=0;k<rem;k++) base[fracs[k % fracs.length].i]++;
  opts.forEach((o,j)=>{ o._color = tint(accent, n<=1?0:(j/(n-1))*0.6); o._dots = base[j]; });
  let dots = '';
  opts.forEach((o,j)=>{ for(let d=0; d<o._dots; d++) dots += '<span class="wdot" data-idx="'+q.options.indexOf(o)+'" style="background:'+o._color+'"></span>'; });
  const legend = '<div class="distbar-legend wlegend">' + opts.map(o=>
    '<div class="distbar-li" data-idx="'+q.options.indexOf(o)+'"><span class="sw" style="background:'+o._color+'"></span>'
    + '<span class="t">'+esc(o.label)+'</span> <span class="v">'+pctStr(o.pct)+'</span></div>'
  ).join('') + '</div>';
  return '<div class="chart waffle"><div class="wgrid">'+dots+'</div>'+legend+'</div>';
}

function card(q, accent){
  const viz = resolveViz(q);
  let body;
  if(viz==='histogram') body = renderHistogram(q, accent);
  else if(viz==='waffle') body = renderWaffle(q, accent);
  else if(viz==='lollipop') body = renderLollipop(q, accent);
  else if(viz==='bars') body = renderBars(q, accent);
  else if(viz==='bubbles') body = renderBubbles(q, accent);
  else body = renderDiverging(q, accent);
  const ins = INSIGHTS[q.pollId] ? '<div class="insight">'+INSIGHTS[q.pollId]+'</div>' : '';
  return '<div class="card" style="--card-accent:'+accent+';--insight-bg:'+tint(accent,0.93)+'">'
    + '<div class="q-head"><div class="q-title">'+esc(q.question)+'</div></div>'
    + '<span class="q-tag tag-'+q.type+'">'+tagText[q.type]+'</span>'+body+ins+'</div>';
}

function introSlide(seg, accent){
  const intro = INTRO[seg]; if(!intro) return '';
  const stats = (intro.stats||[]).map(s=>{
    const num = ('count' in s)
      ? '<div class="n" data-count="'+s.count+'" data-suffix="'+(s.suffix||'')+'">0'+(s.suffix||'')+'</div>'
      : '<div class="n">'+s.disp+'</div>';
    return '<div class="stat">'+num+'<div class="l">'+s.label+'</div></div>';
  }).join('');
  const strip = stats ? '<div class="stat-strip">'+stats+'</div>' : '';
  return '<div class="slide-title">'
    + '<div class="eyebrow" style="color:'+accent+'">'+intro.eyebrow+'</div>'
    + '<h1>'+intro.title+'</h1>'
    + '<p class="lede">'+intro.lede+'</p>'
    + strip + '</div>';
}

  const suffix = el.dataset.suffix || '';
  const dur = 850; let start = null;
  function step(ts){ if(start===null) start = ts;
    const p = Math.min((ts-start)/dur, 1), e = 1-Math.pow(1-p,3);
    el.textContent = (target*e).toFixed(dec)+suffix;
    if(p<1) requestAnimationFrame(step); else el.textContent = target.toFixed(dec)+suffix;
  }
  requestAnimationFrame(step);
}

function resetSlide(slide){
  slide.querySelectorAll('.fill').forEach(f=>f.style.width='0');
  slide.querySelectorAll('.distbar-seg').forEach(s=>s.style.flexBasis='0%');
  slide.querySelectorAll('.lstem').forEach(s=>s.style.width='0');
  slide.querySelectorAll('.ldot').forEach(d=>d.style.left='0');
  slide.querySelectorAll('.hbar').forEach(b=>b.style.height='0');
  slide.querySelectorAll('[data-count]').forEach(el=>{ el.dataset.done=''; el.textContent = el.dataset.suffix ? '0'+el.dataset.suffix : (el.dataset.count.indexOf('.')>=0?'0.0':'0'); });
}
function animateSlide(slide){
  slide.querySelectorAll('.fill').forEach(f=>{ requestAnimationFrame(()=>{ f.style.width = f.dataset.w + '%'; }); });
  slide.querySelectorAll('.distbar-seg').forEach(s=>{ requestAnimationFrame(()=>{ s.style.flexBasis = s.dataset.basis + '%'; }); });
  slide.querySelectorAll('.lstem').forEach(s=>{ requestAnimationFrame(()=>{ s.style.width = s.dataset.w + '%'; }); });
  slide.querySelectorAll('.ldot').forEach(d=>{ requestAnimationFrame(()=>{ d.style.left = d.dataset.w + '%'; }); });
  slide.querySelectorAll('.hbar').forEach(b=>{ requestAnimationFrame(()=>{ b.style.height = b.dataset.h + 'px'; }); });
  slide.querySelectorAll('[data-count]').forEach(countUp);
}

let current = 0;
function go(i){
  i = Math.max(0, Math.min(N-1, i));
  current = i;
  trackEl.style.transform = 'translateX('+(-i*100)+'%)';
  dotsEl.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('on', j===i));
  counterEl.textContent = (i+1) + ' / ' + N;
  prevBtn.disabled = i===0;
  nextBtn.disabled = i===N-1;
  resetSlide(slides[i]);
  animateSlide(slides[i]);
}

prevBtn.onclick = ()=>go(current-1);
nextBtn.onclick = ()=>go(current+1);

// keyboard
deckEl.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'){ e.preventDefault(); go(current+1); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); go(current-1); }
});
document.addEventListener('keydown', e=>{
  if(e.target.closest('.deck')) return; // handled above
  if(e.key==='ArrowRight') go(current+1);
  else if(e.key==='ArrowLeft') go(current-1);
});

// touch swipe
let tsx=0, tsy=0, swiping=false;
deckEl.addEventListener('touchstart', e=>{ tsx=e.touches[0].clientX; tsy=e.touches[0].clientY; swiping=true; }, {passive:true});
deckEl.addEventListener('touchend', e=>{
  if(!swiping) return; swiping=false;
  const dx = e.changedTouches[0].clientX - tsx;
  const dy = e.changedTouches[0].clientY - tsy;
  if(Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) go(current+1); else go(current-1);
  }
}, {passive:true});

// init
go(0);
</script>
</body>
</html>
